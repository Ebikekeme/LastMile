apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: lastmile
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: lastmile-gateway:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 4000
          env:
            - name: PORT
              value: "4000"
            - name: MONGO_URI
              valueFrom:
                configMapKeyRef:
                  name: lastmile-config
                  key: MONGO_URI
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: lastmile-config
                  key: REDIS_URL
            - name: ORDER_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: lastmile-config
                  key: ORDER_SERVICE_URL
            - name: DISPATCH_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: lastmile-config
                  key: DISPATCH_SERVICE_URL
            - name: TRACKING_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: lastmile-config
                  key: TRACKING_SERVICE_URL
            - name: NOTIFY_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: lastmile-config
                  key: NOTIFY_SERVICE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: lastmile-secret
                  key: JWT_SECRET
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: lastmile
spec:
  selector:
    app: gateway
  type: NodePort
  ports:
    - port: 4000
      targetPort: 4000
      nodePort: 30400