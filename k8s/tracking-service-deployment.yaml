apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: C:\ProgramData\chocolatey\lib\kubernetes-kompose\tools\kompose.exe convert -f docker-compose.yml -o k8s/
    kompose.version: 1.38.0 (a8f5d1cbd)
  labels:
    io.kompose.service: tracking-service
  name: tracking-service
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: tracking-service
  template:
    metadata:
      annotations:
        kompose.cmd: C:\ProgramData\chocolatey\lib\kubernetes-kompose\tools\kompose.exe convert -f docker-compose.yml -o k8s/
        kompose.version: 1.38.0 (a8f5d1cbd)
      labels:
        io.kompose.service: tracking-service
    spec:
      containers:
        - env:
            - name: MONGO_URI
              value: mongodb://admin:secret@mongo:27017/lastmile?authSource=admin
            - name: PORT
              value: "4003"
            - name: REDIS_URL
              value: redis://redis:6379
          image: tracking-service
          name: lastmile-tracking-service
          ports:
            - containerPort: 4003
              protocol: TCP
      restartPolicy: Always
