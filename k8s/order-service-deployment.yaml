apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: C:\ProgramData\chocolatey\lib\kubernetes-kompose\tools\kompose.exe convert -f docker-compose.yml -o k8s/
    kompose.version: 1.38.0 (a8f5d1cbd)
  labels:
    io.kompose.service: order-service
  name: order-service
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: order-service
  template:
    metadata:
      annotations:
        kompose.cmd: C:\ProgramData\chocolatey\lib\kubernetes-kompose\tools\kompose.exe convert -f docker-compose.yml -o k8s/
        kompose.version: 1.38.0 (a8f5d1cbd)
      labels:
        io.kompose.service: order-service
    spec:
      containers:
        - env:
            - name: MONGO_URI
              value: mongodb://admin:secret@mongo:27017/lastmile?authSource=admin
            - name: PORT
              value: "4001"
          image: order-service
          name: lastmile-order-service
          ports:
            - containerPort: 4001
              protocol: TCP
      restartPolicy: Always
