apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: C:\ProgramData\chocolatey\lib\kubernetes-kompose\tools\kompose.exe convert -f docker-compose.yml -o k8s/
    kompose.version: 1.38.0 (a8f5d1cbd)
  labels:
    io.kompose.service: gateway
  name: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: gateway
  template:
    metadata:
      annotations:
        kompose.cmd: C:\ProgramData\chocolatey\lib\kubernetes-kompose\tools\kompose.exe convert -f docker-compose.yml -o k8s/
        kompose.version: 1.38.0 (a8f5d1cbd)
      labels:
        io.kompose.service: gateway
    spec:
      containers:
        - env:
            - name: DISPATCH_SERVICE_URL
              value: http://dispatch-service:4002
            - name: JWT_SECRET
              value: supersecretkey
            - name: MONGO_URI
              value: mongodb://admin:secret@mongo:27017/lastmile?authSource=admin
            - name: NOTIFY_SERVICE_URL
              value: http://notify-service:4004
            - name: ORDER_SERVICE_URL
              value: http://order-service:4001
            - name: PORT
              value: "4000"
            - name: REDIS_URL
              value: redis://redis:6379
            - name: TRACKING_SERVICE_URL
              value: http://tracking-service:4003
          image: gateway
          name: lastmile-gateway
          ports:
            - containerPort: 4000
              protocol: TCP
      restartPolicy: Always
