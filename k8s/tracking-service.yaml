apiVersion: apps/v1
kind: Deployment
metadata:
  name: tracking-service
  namespace: lastmile
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tracking-service
  template:
    metadata:
      labels:
        app: tracking-service
    spec:
      containers:
        - name: tracking-service
          image: lastmile-tracking-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 4003
          env:
            - name: PORT
              value: "4003"
            - name: MONGO_URI
              valueFrom:
                configMapKeyRef:
                  name: lastmile-config
                  key: MONGO_URI
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: lastmile-config
                  key: REDIS_URL
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          livenessProbe:
            httpGet:
              path: /health
              port: 4003
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 4003
            initialDelaySeconds: 15
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: tracking-service
  namespace: lastmile
spec:
  selector:
    app: tracking-service
  ports:
    - port: 4003
      targetPort: 4003